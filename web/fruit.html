<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Collie Produce Detector</title><style>
:root{color-scheme:dark;font-family:Inter,system-ui;background:#06120f;color:#effff9}body{max-width:1180px;margin:auto;padding:20px}header{display:flex;justify-content:space-between;align-items:center}h1{margin:.1em 0}.pill,.panel{border:1px solid #326b58;border-radius:14px;padding:12px;background:#0b211a}figure{margin:16px 0;border:1px solid #326b58;border-radius:16px;overflow:hidden;background:#000;min-height:220px}img{display:block;width:100%}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.good{color:#55f09a}.bad{color:#ff8b7d}.muted{color:#9cbcaf;font-size:.92rem}.detection{padding:10px 0;border-bottom:1px solid #214b3d}.confidence{font-size:1.3rem;font-weight:800;color:#55f09a}.empty{padding:18px 0;color:#9cbcaf}code{overflow-wrap:anywhere}
</style></head><body><header><div><div class="muted">On-Go2 local inference · no hosted API</div><h1>Fruit + Vegetable Detector</h1></div><div id="live" class="pill">Connecting</div></header>
<figure><img id="camera" alt="Camera with local fruit detections"></figure>
<div class="grid"><section class="panel"><b>Detections</b><div id="detections" class="empty">No fruit or vegetable detected</div></section>
<section class="panel"><b>Model</b><p><code id="model">Loading</code></p><div id="threshold" class="muted"></div><div id="classes" class="muted"></div></section>
<section class="panel"><b>Runtime</b><p id="source" class="muted"></p><p id="performance" class="muted"></p><p id="error" class="bad"></p></section></div>
<script>
const live=document.querySelector('#live'),camera=document.querySelector('#camera'),detections=document.querySelector('#detections'),model=document.querySelector('#model'),threshold=document.querySelector('#threshold'),classes=document.querySelector('#classes'),source=document.querySelector('#source'),performance=document.querySelector('#performance'),error=document.querySelector('#error');
function renderDetections(items){detections.replaceChildren();if(!items.length){detections.className='empty';detections.textContent='No fruit or vegetable detected';return}detections.className='';for(const item of items){const row=document.createElement('div');row.className='detection';const score=document.createElement('div');score.className='confidence';score.textContent=`${item.label} · ${(item.confidence*100).toFixed(1)}%`;const details=document.createElement('div');details.className='muted';details.textContent=`center (${item.center[0]}, ${item.center[1]}) · box (${item.bbox_xyxy.join(', ')})`;row.append(score,details);detections.append(row)}}
async function refresh(){try{const response=await fetch('/api/status',{cache:'no-store'});const state=await response.json();live.textContent=state.ok?'CAMERA LIVE':'CAMERA WAITING';live.className=`pill ${state.ok?'good':'bad'}`;model.textContent=state.model_path;threshold.textContent=`Confidence threshold: ${(state.confidence_threshold*100).toFixed(0)}%`;classes.textContent=`Classes: ${Object.values(state.classes).join(', ')}`;source.textContent=`Source: ${state.source}`;performance.textContent=`Frame ${state.frame_count} · inference ${state.inference_ms??'—'} ms`;error.textContent=state.error||'';renderDetections(state.detections);if(state.frame_count)camera.src=`/camera.jpg?t=${Date.now()}`}catch(exc){live.textContent='APP UNAVAILABLE';live.className='pill bad';error.textContent=String(exc)}}
refresh();setInterval(refresh,250);
</script></body></html>
