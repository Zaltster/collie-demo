<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Collie Demo</title><style>
:root{color-scheme:dark;font-family:Inter,system-ui;background:#06120f;color:#effff9}body{max-width:1180px;margin:auto;padding:20px}header{display:flex;justify-content:space-between;align-items:center}h1{margin:.1em 0}.pill,.panel{border:1px solid #326b58;border-radius:14px;padding:12px;background:#0b211a}figure{margin:16px 0;border:1px solid #326b58;border-radius:16px;overflow:hidden;background:#000}img{display:block;width:100%}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.good{color:#55f09a}.bad{color:#ffbb77}button,input{font:inherit;border-radius:10px;padding:12px;border:1px solid #458772}button{background:#174d3a;color:white;font-weight:700;cursor:pointer}button:disabled{opacity:.4;cursor:not-allowed}#hold{background:#12733f;min-height:72px;width:100%;font-size:1.1rem}#stop{background:#8a2727}.muted{color:#9cbcaf;font-size:.92rem}
</style></head><body><header><div><div class="muted">Woof · guarded motion</div><h1>Blue Whale Walk</h1></div><div id="live" class="pill">Connecting</div></header>
<figure><img id="camera" src="/camera.jpg" alt="Woof camera with blue-whale detection"></figure>
<div class="grid"><section class="panel"><b>Target</b><div id="target" class="bad">Not detected</div><div id="command" class="muted">motion zero</div></section>
<section class="panel"><b>1. Arm</b><p class="muted">Verify the floor and people are clear, then type the exact confirmation.</p><input id="phrase" autocomplete="off" value="WHALE AND PATH CLEAR" style="width:calc(100% - 26px)"><p><button id="arm">Arm one burst</button></p></section>
<section class="panel"><b>2. Hold to walk</b><p class="muted">Releasing, losing the whale, losing the page, or reaching the time budget stops motion.</p><button id="hold" disabled>PRESS AND HOLD</button><p><button id="stop">STOP NOW</button></p></section></div>
<script>
const live=document.querySelector('#live'),camera=document.querySelector('#camera'),target=document.querySelector('#target'),command=document.querySelector('#command'),arm=document.querySelector('#arm'),hold=document.querySelector('#hold'),stop=document.querySelector('#stop'),phrase=document.querySelector('#phrase');let timer=null;
async function api(path,body){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json'},body:body?JSON.stringify(body):undefined});if(!r.ok){const e=await r.json();throw new Error(e.detail||r.statusText)}return r.json()}
async function refresh(){try{const s=await fetch('/api/status',{cache:'no-store'}).then(r=>r.json());live.textContent=s.ok?'CAMERA LIVE':'CAMERA LOST';live.className=`pill ${s.ok?'good':'bad'}`;target.textContent=s.blue_whale?`Blue whale stable ${s.blue_whale.visible_frames} frames · ${Math.round(s.blue_whale.confidence*100)}%`:'Blue whale not detected';target.className=s.blue_whale?'good':'bad';command.textContent=`${s.command.reason} · forward ${s.command.forward_mps.toFixed(2)} m/s · yaw ${s.command.yaw_rps.toFixed(2)} rad/s · ${s.forward_remaining_s.toFixed(1)}s remaining`;hold.disabled=!s.armed;camera.src=`/camera.jpg?t=${Date.now()}`}catch(e){live.textContent='APP UNAVAILABLE';live.className='pill bad'}}
arm.onclick=async()=>{try{await api('/api/arm',{confirmation:phrase.value});await refresh()}catch(e){alert(e.message)}};
async function pulse(){try{await api('/api/pulse')}catch(e){endHold();alert(e.message)}}
function beginHold(e){e.preventDefault();if(timer)return;pulse();timer=setInterval(pulse,120)}
function endHold(){if(timer){clearInterval(timer);timer=null}api('/api/stop').catch(()=>{});refresh()}
hold.addEventListener('pointerdown',beginHold);window.addEventListener('pointerup',endHold);window.addEventListener('pointercancel',endHold);window.addEventListener('blur',endHold);stop.onclick=endHold;
refresh();setInterval(refresh,250);
</script></body></html>
